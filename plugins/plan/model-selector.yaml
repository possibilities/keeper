# Post-scaffold model+effort selector policy config.
#
# Read off disk by the selection-brief handoff only — never compile-embedded.
# During the ghost window the `plan:model-selector` subagent reads the brief,
# uses this policy to choose each task's {effort, model} cell, then the
# orchestrator writes the cells via `keeper plan assign-cells`.
#
# The `model-guidance` skill (plugins/plan/skills/model-guidance/) OWNS the
# content here: every efforts:/models: block is authored and refreshed by that
# skill, and the research: map's hashes are drift-gated against the skill's
# references/ cache. Axis source of truth is subagents.yaml (efforts: + models:);
# this file must carry exactly one guidance block per configured axis value.
# Adding an axis value = edit subagents.yaml, then run the model-guidance skill
# to backfill here. The gate fails until backfilled:
#   bun plugins/plan/scripts/model-guidance-check.ts --check

# Selector source metadata retained for the config schema.
# Runtime is the custom `plan:model-selector` subagent; its frontmatter owns the
# actual Claude model/effort used to classify tasks.
selector:
  harness: claude
  model: opus

# How the selector weighs the two axes, and its default-when-uncertain rule.
usage: |
  Choose an {effort, model} cell per task from the two axes below, weighing model
  first (which tier can do the work at all?) then effort (how hard should it
  think?) — they are independent axes. The effort axis carries most of the signal:
  match the band to the task's true difficulty (its acceptance shape and blast
  radius), never its line count. On the model axis the binding `hand_tuned` policy
  governs: sonnet is the default implementation workhorse and opus is the
  exception, chosen only on a concrete, nameable intelligence-bound reason. When
  uncertain on the model axis, resolve DOWN to sonnet absent such a reason; when
  uncertain on the effort axis for mechanical work, resolve to the lower band.

# HUMAN-OWNED binding routing policy — the highest-precedence tie-break, carried
# verbatim in every selector brief. NOT authored or refreshed by the
# model-guidance research pass; a human hand-tunes it. Capability-shaped only.
hand_tuned: |
  The burden of proof is on opus. Choose opus ONLY on a concrete, nameable
  intelligence-bound reason: a novel algorithm or design, a cross-cutting
  multi-file architectural cascade, a subtle correctness or security invariant, or
  long-horizon planning. On a tie, or absent such a reason, choose sonnet — the
  default implementation workhorse. Security- or correctness-critical work is a
  hard opus gate that overrides the sonnet-first default regardless of size.
  Mechanical or templated work takes sonnet at low or medium effort. Anti-anchor
  clause: spec length and difficulty adjectives are not difficulty — a short spec
  can be intelligence-bound and a long spec mechanical. Model and effort are
  independent axes: cranking sonnet's effort is not an opus substitute.

# Provenance for the efforts guidance blocks as a whole — the effort axis has no
# per-value research cache, so one review stamp covers the set. OPTIONAL and
# fail-closed: an absent key or a non-"researched" status reads as stub effort
# guidance in `--state`. Read only by the state mode, never the `--check` gate.
efforts_provenance:
  last_reviewed: 2026-07-06
  status: researched

# One guidance block per configured `efforts:` axis value (subagents.yaml).
# Concrete, behavioral, worker-facing selection advice — when to route a task to
# this effort. Keep each block short: the whole config rides in every selector
# brief.
efforts:
  low: |
    Tiny, reversible, near-mechanical edits where the acceptance leaves no
    design choice: text/config polish, one obvious assertion, a trivial rename.
    The fastest, most literal band; the worker scopes strictly to what was asked,
    so anything needing investigation or multi-step reasoning under-thinks here.
  medium: |
    Bounded single-surface work with a "do exactly this" acceptance: one-file
    edits, mechanical refactors, straight test additions. The step down from high
    in thinking depth. Risk is under-thinking when the task hides cross-module
    reasoning — prefer a higher band rather than prompt around it.
  high: |
    The model-default band and the usual sweet spot: multi-file features in a
    known pattern, typical bug fixes with the root cause named, obvious in-repo
    template-following. Balances depth against over-thinking; pick it when the
    path is clear but execution spans a few files.
  xhigh: |
    The band for hard coding and agentic work: multi-step refactors, new-pattern
    introduction, contract-touching changes (RPC, schema, public API, wire
    format) — anywhere a wrong abstraction propagates past the task. Reserve it
    for genuinely hard or contract-shaped work, never a generic caution upgrade
    over high.
  max: |
    Reserved ceiling: gnarly debugging with no clear hypothesis, evals, or
    security-shaped review — where deeper reasoning measurably lifts quality.
    Diminishing returns and overthinking risk on anything routine; never a
    generic "be careful" upgrade over xhigh.

# One guidance block per configured `models:` axis value (subagents.yaml), plus
# pre-provisioned blocks for host-roster capability models a matrix.yaml may add
# (the runtime selection-brief seam enforces one block per effective model).
# Distilled from the skill's references/ research — strengths, weaknesses,
# when-to-pick. Blocks are strictly capability-shaped: never cost or provider
# ordering, which live in the host matrix and stay invisible to the content-blind
# selector. Raw research stays in references/, never in this prompt-sized block.
models:
  opus: |
    keeper's highest-capability worker tier — the exception, not the default.
    Strengths: long-horizon autonomous execution, contract-shaped reasoning where
    a wrong abstraction propagates, novel algorithm and design work, subtle
    correctness and security invariants, and strong bug-finding that tells a flake
    from a real failure. Weaknesses: under-reaches for subagents / memory / search
    / custom tools unless the prompt names when to use them, and narrates and
    deliberates more than the prior generation. When to pick: only on a concrete,
    nameable intelligence-bound reason per the hand_tuned policy — otherwise
    sonnet.
  sonnet: |
    The default implementation workhorse: near-top-tier quality on bounded coding
    and agentic work, with every effort band available. Strengths: routine
    implementation, template-following, mechanical refactors, targeted tests, and
    fixes with a named surface; follows a tightly-scoped spec literally and
    precisely. Weaknesses: that literalism means an under-specified task fails
    harder here — less margin than opus on ambiguous design, contract/schema/wire
    work, cross-repo changes, migrations, and gnarly debugging. When to pick: the
    default for well-specified implementation work; escalate to opus only for a
    named intelligence-bound reason per the hand_tuned policy.
  gpt-5.5: |
    A capable generalist coding model with strong multi-step reasoning and broad
    language breadth — the first non-default worker tier, routed under a
    deliberate trickle posture. Strengths: from-scratch implementation against a
    clear spec, algorithmic and data-transformation work, and literal execution
    of a bounded, well-specified acceptance. Weaknesses: leans literal on an
    under-specified spec and can drift from a codebase's established idioms unless
    the task names the pattern to follow; less sure than the top tier at telling
    a real failure from a flake in open-ended debugging. When to pick: route it
    ONLY to genuinely-bounded mechanical work in the low/medium band shapes —
    single-surface edits, straight test additions, mechanical refactors with an
    explicit acceptance and a named surface — widening its range only as
    out-of-band cohort evidence grades it right-sized, never by default. When to
    avoid: contract-, schema-, or wire-shaped changes and hypothesis-free
    debugging; keep those on a higher tier.
  gpt-5.3-codex-spark: |
    A fast, lightweight coding model tuned for quick, tightly-scoped edits.
    Strengths: snappy single-file changes, straight test additions, mechanical
    refactors, and literal execution of an unambiguous spec that leaves no design
    choice. Weaknesses: a lower reasoning ceiling than the heavier tiers —
    multi-file design, cross-module reasoning, and ambiguous acceptance
    under-resolve here, and it holds less context across a long agentic loop. When
    to pick: small, reversible, near-mechanical work with a fully-specified
    acceptance. When to avoid: anything needing investigation, contract-shaped
    reasoning, or judgment spanning more than one surface — route those up to a
    higher-capability model.

# Research provenance map: per configured model, the references/ cache file
# (path relative to the plan plugin root) and its sha256. The drift gate asserts
# every configured model has an entry AND each recorded hash matches the file on
# disk — so re-researching a model without re-hashing here fails the fast suite.
research:
  opus:
    reference: skills/model-guidance/references/opus.md
    sha256: 7f4a160d704ae0f05e4543f3c37d61be3d1d6f89e6d76dd044486ac38997a6c4
  sonnet:
    reference: skills/model-guidance/references/sonnet.md
    sha256: cf88409ab1dafa43569e41b5c73d04bc6b9f18a3c3e52b78a9a3c2df3ad2990e
  # Host-roster capability model absent from the embedded subagents.yaml axis. The
  # research entry is tolerated by the host-blind gate, but the reference must
  # exist and hash-match like any other; the guidance block is a pre-provisioned
  # extra the runtime selection-brief seam gates on the effective matrix.
  gpt-5.3-codex-spark:
    reference: skills/model-guidance/references/gpt-5.3-codex-spark.md
    sha256: 02243b59cb4220c4b2f860355446b66e97bb5a02f189d9dc7b50117180426f18
