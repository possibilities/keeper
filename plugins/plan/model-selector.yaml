# Post-scaffold model+effort selector policy config.
#
# Read off disk by the selection-brief handoff only — never compile-embedded.
# During the ghost window the `plan:model-selector` subagent reads the brief,
# uses this policy to choose each task's {effort, model} cell, then the
# orchestrator writes the cells via `keeper plan assign-cells`.
#
# The `model-guidance` skill (plugins/plan/skills/model-guidance/) OWNS the
# content here: every efforts:/models: block is authored and refreshed by that
# skill, and the research: map's hashes are drift-gated against the skill's
# references/ cache. Axis source of truth is the required host matrix
# (~/.config/keeper/matrix.yaml; efforts: + subagent_models:); this file must
# carry exactly one guidance block per configured axis value. Adding an axis
# value = edit matrix.yaml, then run the model-guidance skill to backfill here.
# The gate fails until backfilled:
#   bun plugins/plan/scripts/model-guidance-check.ts --check

# Selector source metadata retained for the config schema.
# Runtime is the custom `plan:model-selector` subagent; its frontmatter owns the
# actual Claude model/effort used to classify tasks.
selector:
  harness: claude
  model: opus

# How the selector weighs the two axes, and its default-when-uncertain rule.
usage: |
  Choose an {effort, model} cell per task from the two axes below, weighing model
  first (which tier can do the work at all?) then effort (how hard should it
  think?) — they are independent axes. The effort axis carries most of the signal:
  match the band to the task's true difficulty (its acceptance shape and blast
  radius), never its line count. On the model axis the binding `hand_tuned` policy
  governs the family split: gpt tiers are the default for well-specified work
  that does not need deep judgment or taste; sonnet is the workhorse for
  judgment-heavy work, and opus the exception, chosen only on a concrete,
  nameable intelligence-bound reason. When uncertain on the model axis, bounded
  well-specified work resolves to a GPT tier and open-ended or judgment-heavy
  work resolves to sonnet. Among reliable GPT fits, apply the hand-tuned Spark
  preference only to small, reversible, fixed-shape edits across a few explicitly
  named files; when uncertain on the effort axis for mechanical work, resolve to
  the lower band.

# HUMAN-OWNED binding routing policy — the highest-precedence tie-break, carried
# verbatim in every selector brief. NOT authored or refreshed by the
# model-guidance research pass; a human hand-tunes it. Capability- and
# economics-shaped.
hand_tuned: |
  Two families, one split: Claude models carry the best taste, creativity, and
  judgment; GPT models are faster and almost always cheaper per token. PREFER a
  GPT tier whenever Claude-tuned capabilities are not needed — well-specified
  work whose quality bar is correctness against a nameable acceptance routes to
  the GPT model whose guidance block fits it. Reach for sonnet when the task
  genuinely needs Claude-tuned judgment: ambiguous or under-specified
  acceptance, design and API-surface taste, user-facing wording, creative or
  greenfield shaping, or delicate in-repo idiom matching. The burden of proof
  is on opus. Choose opus ONLY on a concrete, nameable intelligence-bound
  reason: a novel algorithm or design, a cross-cutting multi-file architectural
  cascade, a task that must derive, adjudicate, or validate a subtle correctness
  or security invariant, or long-horizon planning. Mechanical implementation or
  deterministic verification of an already-specified invariant follows ordinary
  capability routing. For work that clears those Claude/opus gates, apply the
  Spark burn preference: `gpt-5.3-codex-spark` has independent, non-conserved
  quota. It fits small, reversible, fixed-shape edits across a few explicitly
  named files, including routine navigation, deterministic verification, and
  mechanical implementation/verification of an already-specified contract,
  schema, wire, or correctness invariant. It excludes open-ended diagnosis,
  cross-module discovery or reasoning, contract or security design, ambiguous or
  subtle contract/security reasoning, ambiguous acceptance, taste, judgment, and long
  trajectories or context needs. When Spark fits, choose it ahead of every
  other model that could also complete the task. This ranks models after the
  capability gate; it never widens that gate. Otherwise continue normal best-fit
  routing. Anti-anchor clause: spec length and difficulty adjectives are not
  difficulty — a short spec can be intelligence-bound and a long spec mechanical.
  Model and effort are independent axes: cranking a cheaper tier's effort is not
  a substitute for a more capable model.

# Provenance for the efforts guidance blocks as a whole — the effort axis has no
# per-value research cache, so one review stamp covers the set. OPTIONAL and
# fail-closed: an absent key or a non-"researched" status reads as stub effort
# guidance in `--state`. Read only by the state mode, never the `--check` gate.
efforts_provenance:
  last_reviewed: 2026-07-06
  status: researched

# One guidance block per configured `efforts:` axis value (the required host
# matrix). Concrete, behavioral, worker-facing selection advice — when to route
# a task to this effort. Keep each block short: the whole config rides in every
# selector brief.
efforts:
  low: |
    Tiny, reversible, near-mechanical edits where the acceptance leaves no
    design choice: text/config polish, one obvious assertion, a trivial rename.
    The fastest, most literal band; the worker scopes strictly to what was asked,
    so anything needing investigation or multi-step reasoning under-thinks here.
  medium: |
    Bounded single-surface work with a "do exactly this" acceptance: one-file
    edits, mechanical refactors, straight test additions. The step down from high
    in thinking depth. Risk is under-thinking when the task hides cross-module
    reasoning — prefer a higher band rather than prompt around it.
  high: |
    The model-default band and the usual sweet spot: multi-file features in a
    known pattern, typical bug fixes with the root cause named, obvious in-repo
    template-following. Balances depth against over-thinking; pick it when the
    path is clear but execution spans a few files.
  xhigh: |
    The band for hard coding and agentic work: multi-step refactors, new-pattern
    introduction, contract-touching changes (RPC, schema, public API, wire
    format) — anywhere a wrong abstraction propagates past the task. Reserve it
    for genuinely hard or contract-shaped work, never a generic caution upgrade
    over high.
  max: |
    Reserved ceiling: gnarly debugging with no clear hypothesis, evals, or
    security-shaped review — where deeper reasoning measurably lifts quality.
    Diminishing returns and overthinking risk on anything routine; never a
    generic "be careful" upgrade over xhigh.

# One guidance block per configured `models:` axis value (the required host
# matrix), plus pre-provisioned blocks for host-roster capability models a
# matrix.yaml may add (the runtime selection-brief seam enforces one block per
# effective model).
# Distilled from the skill's references/ research — strengths, weaknesses,
# when-to-pick. Blocks are strictly capability-shaped: never cost or provider
# ordering, which live in the host matrix and stay invisible to the content-blind
# selector. Raw research stays in references/, never in this prompt-sized block.
models:
  opus: |
    keeper's highest-capability worker tier — the exception, not the default.
    Strengths: long-horizon autonomous execution, contract-shaped reasoning where
    a wrong abstraction propagates, novel algorithm and design work, tasks that
    must derive/adjudicate/validate subtle correctness or security invariants, and
    strong bug-finding that tells a flake from a real failure. Weaknesses: under-reaches
    for subagents / memory / search / custom tools unless the prompt names when to
    use them, and narrates and deliberates more than the prior generation. When to
    pick: only on a concrete, nameable intelligence-bound reason per the
    hand_tuned policy — mechanical implementation or deterministic verification of
    an already-specified invariant follows ordinary capability routing.
  sonnet: |
    The implementation workhorse for judgment-heavy work: near-top-tier quality
    on bounded coding and agentic work, with every effort band available, and
    the strongest judgment, taste, and idiom-matching short of opus. Strengths: routine
    implementation, template-following, mechanical refactors, targeted tests, and
    fixes with a named surface; follows a tightly-scoped spec literally and
    precisely. Weaknesses: that literalism means an under-specified task fails
    harder here — less margin than opus on ambiguous design, contract/schema/wire
    work, cross-repo changes, migrations, and gnarly debugging. When to pick: per
    the hand_tuned policy, the tier for judgment-heavy or under-specified work
    that does not need opus — ambiguous acceptance, design and API-surface taste,
    user-facing wording, delicate idiom matching; well-specified bounded work
    routes GPT-first instead.
  gpt-5.6-sol: |
    The GPT flagship tier and a reserve pick, not a default — the highest
    GPT-side reasoning ceiling and best complex-edit safety of its family, with
    a very large (1M-token) context, but over-powered for most work: its ceiling
    is wasted on well-specified tasks the mid tiers clear cleanly. Strengths: the
    genuinely hardest bounded GPT-side work — hard multi-file changes with an
    explicit acceptance, big-working-set navigation, long tool-heavy trajectories
    where the top reasoning ceiling is the deciding factor. Weaknesses: documented
    over-persistence — can push past stated intent (scope-exceeding cleanups,
    over-claimed results), strongest at the top reasoning efforts; give it
    explicit stop conditions and an allowed change-scope, and keep it off
    unsupervised destructive scope. When to pick: rarely — send ordinary
    well-specified work to gpt-5.6-terra and substantial multi-file work to
    gpt-5.5, reserving sol for the hardest well-specified tail where the mid tiers
    genuinely fall short; opus still owns nameable intelligence-bound reasons.
  gpt-5.5: |
    A frontier-class GPT tier a half-step below the 5.6 flagship; its vendor
    sweet spot is multi-step agentic coding — plan, navigate, edit across
    files, verify — with precise tool use over large surfaces, efficient
    reasoning, and a very large (1M-token) context. Strengths: substantial
    well-specified implementation — spec'd features and multi-file mechanical
    changes in a known pattern — executed literally and thoroughly. Weaknesses:
    documented over-eagerness (may act when only asked to answer, or drift past
    the stated change-scope); overthinks under weak stopping criteria; drifts
    from house idiom unless the pattern is named. When to pick: the GPT
    workhorse for substantial well-specified work — name the acceptance, the
    allowed scope, and a stop condition; step up to gpt-5.6-sol for the hardest
    bounded work.
  gpt-5.6-terra: |
    The balanced middle of the 5.6 family: near-frontier everyday coding
    capability at a lighter weight, a full-size (1M-token) context, and the
    family's best resistance to prompt injection in tool results. Strengths:
    ordinary well-specified implementation — bounded features, multi-step
    edits, tool-driven loops with a named acceptance. Weaknesses: below sol on
    reasoning ceiling and complex-edit safety (gnarly multi-file edits carry
    more overwrite risk); shares the family's over-eager tendency — name scope
    and stop conditions. When to pick: the everyday GPT tier and first reach
    for ordinary well-specified work; step up to sol or gpt-5.5 for genuinely
    hard multi-file reasoning, down to a light tier for tiny mechanical edits.
  gpt-5.4: |
    The prior-generation GPT flagship: strong production-grade agentic coding,
    close repo-pattern adherence, a very large (1M-token) context, and
    token-efficient long tool-heavy trajectories. Strengths: multi-file
    mechanical changes with an explicit shape, big-working-set edits, faithful
    instruction-following. Weaknesses: a step below gpt-5.5 and sol in
    reasoning ceiling; under-thinks if dispatched without an explicit effort
    band. When to pick: well-specified multi-file work where a large context or
    strict repo-pattern adherence is the deciding factor and the path is
    explicit; prefer terra or gpt-5.5 when the reasoning gets hard.
  gpt-5.4-mini: |
    The strongest GPT light tier: real reasoning headroom and a large (400K)
    context in a fast, high-volume class — trails the full 5.4 only modestly on
    agentic-coding evals. Strengths: high-volume bounded edits, straight test
    additions, mechanical refactors, and bounded agent loops needing some
    reasoning — carries bounded-but-not-tiny tasks that spark would strand.
    Weaknesses: below the full-model ceiling — give it the choice pre-made;
    contract-shaped blast radius stays off it. When to pick: bounded mechanical
    work with real reasoning or working-set demand — prefer it over spark and
    luna there; step up to terra or gpt-5.5 when work spans surfaces or needs
    design judgment.
  gpt-5.6-luna: |
    The 5.6 family's lightweight tier: the fastest of the family, with a
    full-size (1M-token) context despite its light weight — built for small,
    fast, high-volume tasks. Strengths: snappy single-surface edits, straight
    test additions, template-following with a named pattern, big-input reads.
    Weaknesses: the lowest reasoning ceiling of the GPT tiers and the family's
    weakest complex-edit safety — keep it off multi-file edits and anything
    with overwrite risk; shares the family's over-eager tendency. When to pick:
    tiny-to-small fully-specified mechanical work; prefer gpt-5.4-mini when a
    bounded task needs more reasoning, terra when it grows past one surface.
  gpt-5.3-codex-spark: |
    A fast, lightweight coding model tuned for quick, tightly-scoped edits.
    Strengths: snappy fixed-shape changes across one or a few explicitly named
    files, straight test additions, mechanical refactors, routine navigation, and
    deterministic verification of an already-specified assertion or contract.
    Weaknesses: a lower reasoning ceiling than the heavier tiers — open-ended
    diagnosis, cross-module discovery or reasoning, contract/security design,
    ambiguous acceptance, taste/judgment, subtle contract/security reasoning, and long
    agentic loops under-resolve here. When to pick: small, reversible,
    fixed-shape work with a fully-specified acceptance and no design choice,
    including mechanical implementation/verification of an already-specified
    contract, schema, wire, or correctness invariant. When to avoid: open-ended diagnosis,
    contract or security design, subtle invariant reasoning, or unbounded
    cross-surface judgment.

