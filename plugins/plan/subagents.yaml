# The embedded DEFAULT plan worker {model × effort} matrix — every model here is
# claude-native. A host `~/.config/keeper/matrix.yaml` (ADR 0010), when present,
# overrides these axes at run time: an ordered provider roster grows the model
# axis with capability models served by non-claude harnesses (wrapped cells).
# With no host matrix, selection, rendering, and dispatch use exactly these axes.
#
# Two consumers route through the shared loader (src/subagents_config.ts):
#   - build time: render-plugin-templates reads this file (composed with the host
#     matrix) and fans out one self-contained `work` plugin per {model × effort}
#     cell under workers/<model>-<effort>/ (manifest name work, agent name worker).
#   - runtime: the compiled keeper-plan binary reads an embedded snapshot of this
#     file (baked in at `bun build --compile`) so the resolver validates a task's
#     effort/model against the same defaults wherever it runs.
#
# Adding a model or effort is a one-line edit here — no per-cell plugin dirs by
# hand. Effort is NOT spawn-overridable in Claude Code, so each effort is baked
# into its generated agent definition rather than passed at spawn.
#
# The post-scaffold selector's policy config (model-selector.yaml, owned by the
# model-guidance skill) carries exactly one guidance block per axis value here;
# its drift gate (model-guidance-check.ts --check) fails until a newly-added
# value is backfilled there.
efforts: [low, medium, high, xhigh, max]
models: [opus, sonnet]
subagents: [template/agents/worker.md.tmpl]
