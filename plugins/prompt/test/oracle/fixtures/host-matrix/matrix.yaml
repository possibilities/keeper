# Pinned claude-only host worker matrix (v2) for the prompt regression-pin suite
# and the golden capture. Every render the parity suite drives resolves this dir
# as its KEEPER_CONFIG_DIR, so the goldens stay host-blind — no operator
# ~/.config/keeper/matrix.yaml can leak into a compare. Its cell set (opus/sonnet
# × the five efforts, all native) is what the render-plugin-templates golden
# tree pins, and its `agent_pins` (below) drive the 11 static plan agents'
# rendered frontmatter.
efforts:
  - low
  - medium
  - high
  - xhigh
  - max
subagent_templates:
  - template/agents/worker.md.tmpl
subagent_models:
  - opus
  - sonnet
providers:
  - name: claude
    models:
      - opus
      - sonnet
wrapper_driver:
  model: sonnet
  effort: high
agent_pins:
  close-planner:
    model: opus
    effort: high
  docs-gap-scout:
    model: opus
    effort: medium
  epic-scout:
    model: opus
    effort: medium
  gap-analyst:
    model: opus
    effort: xhigh
  model-selector:
    model: opus
    effort: high
  panel-judge:
    model: opus
    effort: xhigh
  panel-runner:
    model: opus
    effort: xhigh
  practice-scout:
    model: opus
    effort: medium
  quality-auditor:
    model: opus
    effort: high
  repo-scout:
    model: opus
    effort: high
  selection-auditor:
    model: opus
    effort: high
