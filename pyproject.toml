[project]
name = "keeper-py"
version = "0.1.0"
description = "Read keeper's per-session git file attributions from Python"
requires-python = ">=3.11"
dependencies = []

[tool.hatch.build.targets.wheel]
packages = ["keeper"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ty.analysis]
# Allow imports ty can't resolve from keeper's own environment. The fixture-
# generation scripts under scripts/ import arthack's ``cli_common`` from the
# sibling checkout (guarded by a runtime existence check + sys.path fallback),
# so it's resolved at runtime, never by keeper's venv. Without this, ``uvx ty
# check`` (the jobctl commit-work gate) fails every Python commit on
# unresolved-import. The mypy-style ``# type: ignore[import-not-found]`` on
# those lines does not suppress ty's ``unresolved-import`` rule.
allowed-unresolved-imports = [
    "cli_common",
    "cli_common.*",
]
