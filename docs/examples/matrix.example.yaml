# Example host provider matrix (ADR 0010) — the real activation shape for
# gpt-5.3-codex-spark, committed for reference only. This file lives OUTSIDE
# every discovered config path (`~/.config/keeper/matrix.yaml`) so it can
# never silently activate a foreign provider in repo tooling; it is loaded by
# explicit path only, in `test/agent-matrix.test.ts`'s anti-rot test.
#
# To activate: copy this file to `~/.config/keeper/matrix.yaml` (or author
# your own roster from scratch) and follow docs/install.md's "Host provider
# matrix" walkthrough.

efforts:
  - medium
  - high

providers:
  # claude is always the native provider — its models run in-session.
  - name: claude
    models:
      - opus
      - sonnet
  # codex is cost-ascending first: it serves gpt-5.3-codex-spark as a BARE
  # capability token (codex accepts bare model ids directly, so this
  # activation needs no alias).
  - name: codex
    models:
      - gpt-5.3-codex-spark
      # A provider-qualified slashed alias target is the generic form a
      # harness that rejects bare capability ids requires (pi, for one, at
      # startup) — carried verbatim to the launch model flag as pass-through:
      # - gpt-5.3-codex-spark: openai/gpt-5.3-codex-spark

subagents:
  - work

# The fixed claude model-and-effort every wrapped cell's wrapper runs at.
wrapper_driver:
  model: sonnet
  effort: high

defaults:
  stop_timeout_ms: 7200000
  max_attempts: 2
