# keeper-guard.conf — confirm-before guard for keeper-managed tmux sessions.
#
# Prompts the human before a keyboard-triggered window/split creation inside a
# keeper-managed session (autopilot / pair / panels / agentbus / wrapped). A
# DETERRENT,
# not a hard lock: the mouse menu-bar and programmatic creation bypass key
# bindings entirely. Non-managed (human) sessions are byte-identical to today.
#
# Two coupling contracts — keep in sync by hand:
#  (a) LOAD ORDER. This file MUST install as `zz-keeper-guard.conf` so the
#      human's `tmux.conf` (which sources `conf.d/*.conf` in glob order) loads
#      it AFTER `splitting.conf` — only then do our create-key rebinds win.
#  (b) DUPLICATED-BY-VALUE LITERALS. Static tmux config cannot import TS, so:
#      - the 5 managed session names below are hand-copied from
#        `src/exec-backend.ts` (`*_EXEC_SESSION`); a content-guard unit test
#        (`test/keeper-guard.test.ts`) pins them to that source.
#      - the wrapped split commands are hand-copied from the human's
#        `conf.d/splitting.conf` (the human owns both, so not test-guarded).

# Stamp a session-scoped marker on every FUTURE managed session as it is
# created. Indexed hook slot [42] so this is idempotent on re-source AND
# coexists with any user `session-created` hook (`-g` would clobber, `-ga`
# would duplicate on re-source). `set-option` does NOT format-expand a value,
# so the marker is the LITERAL `1`.
set-hook -g 'session-created[42]' 'if-shell -F "#{||:#{==:#{session_name},autopilot},#{||:#{==:#{session_name},pair},#{||:#{==:#{session_name},panels},#{||:#{==:#{session_name},agentbus},#{==:#{session_name},wrapped}}}}}" "set-option @keeper_managed_session 1"'

# Best-effort sweep for sessions ALREADY live at config-load time (the hook
# above only catches future creates). `-b` runs it in the background so it
# never blocks the command queue.
run-shell -b "for s in autopilot pair panels agentbus wrapped; do tmux has-session -t =\$s 2>/dev/null && tmux set-option -t =\$s @keeper_managed_session 1; done; true"

# Guarded create-keys. Each: in a managed session, wrap the real command in a
# `confirm-before` y/n prompt; otherwise run the command verbatim (byte-
# identical else-branch). `c` is tmux's default `new-window` (no `-c`); the
# splits mirror `splitting.conf`. `%` / `"` stay unbound (out of scope).
bind-key c if-shell -F '#{@keeper_managed_session}' 'confirm-before -p "#S is keeper-managed — open a new window? (y/n)" new-window' new-window
bind-key | if-shell -F '#{@keeper_managed_session}' "confirm-before -p '#S is keeper-managed — split this pane? (y/n)' 'split-window -h -c \"#{pane_current_path}\"'" "split-window -h -c '#{pane_current_path}'"
bind-key _ if-shell -F '#{@keeper_managed_session}' "confirm-before -p '#S is keeper-managed — split this pane? (y/n)' 'split-window -v -c \"#{pane_current_path}\"'" "split-window -v -c '#{pane_current_path}'"
bind-key -n M-'\' if-shell -F '#{@keeper_managed_session}' "confirm-before -p '#S is keeper-managed — split this pane? (y/n)' 'split-window -h -c \"#{pane_current_path}\"'" "split-window -h -c '#{pane_current_path}'"
bind-key -n M-'-' if-shell -F '#{@keeper_managed_session}' "confirm-before -p '#S is keeper-managed — split this pane? (y/n)' 'split-window -v -c \"#{pane_current_path}\"'" "split-window -v -c '#{pane_current_path}'"
