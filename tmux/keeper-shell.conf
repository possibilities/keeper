# keeper-shell.conf — mark shells spawned by tmux for Keeper-owned zsh drop-ins.
#
# Dotfiles' .zshrc recognizes this inherited marker and sources the fixed,
# trusted ~/code/keeper/shell/zsh/*.zsh directory. The marker carries no path,
# so caller-controlled environment cannot redirect shell startup to arbitrary
# code. Existing panes keep their current environment; newly spawned panes and
# nested shells inherit the marker.
set-environment -g KEEPER_ZSH_DROPINS 1
