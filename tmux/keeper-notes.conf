# keeper-notes.conf — fresh Note capture and browse popups.
#
# Binds prefix-table N and B; the human's tmux.conf owns the actual prefix.
# Successful commands close their popup. Failures wait for acknowledgement
# instead of flashing away under display-popup -E.
bind-key -N 'Capture a Keeper note' N display-popup -E -w 90% -h 90% -d '#{pane_current_path}' 'keeper note new --fresh || { code=$?; printf "\nkeeper note new failed (exit %s). Press Enter to close: " "$code" >&2; IFS= read -r _; exit "$code"; }'
bind-key -N 'Browse Keeper notes' B display-popup -E -w 90% -h 90% -d '#{pane_current_path}' 'keeper note browse || { code=$?; printf "\nkeeper note browse failed (exit %s). Press Enter to close: " "$code" >&2; IFS= read -r _; exit "$code"; }'
